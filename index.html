<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS By Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdf4; -webkit-tap-highlight-color: transparent; }
        
        /* เพิ่ม Hardware Acceleration ให้ลื่นขึ้น */
        .product-card { 
            will-change: transform;
            aspect-ratio: 1 / 1; 
            border-radius: 1.5rem; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s; 
            background-color: white;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card:active { transform: scale(0.95); }
        
        .product-card img {
            border-radius: 1rem; 
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background: #f3f4f6; /* Placeholder สีเทาระหว่างรอโหลดรูป */
        }
        .hidden { display: none !important; }
        
        #loader {
            position: fixed; inset: 0; background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loader" class="hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-[#10b981]"></div>
    </div>

    <section id="loginView" class="fixed inset-0 bg-green-50 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center border border-green-100">
            <div class="w-20 h-20 bg-[#10b981] rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl shadow-lg">
                <i class="fas fa-store"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-gray-800">ยินดีต้อนรับ</h2>
            <p class="text-gray-500 mb-6 text-sm">กรุณาใส่รหัส PIN เพื่อเริ่มการขาย</p>
            <input type="password" id="loginPin" inputmode="numeric" placeholder="••••" maxlength="6" class="w-full border-2 border-green-50 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] outline-none focus:border-[#10b981] transition-all mb-4">
            <button onclick="handleLogin()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">เข้าสู่ระบบ</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <div class="bg-white px-4 py-2 rounded-full shadow-sm border border-green-100 flex items-center gap-2">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span id="userBadge" class="text-sm font-bold text-gray-700">...</span>
        </div>
        <button onclick="handleLogout()" class="text-red-400 text-xs font-bold bg-white px-4 py-2 rounded-full border shadow-sm active:bg-red-50">Logout</button>
    </nav>

    <section id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">รายการสินค้า</h1>
            <button onclick="syncData()" class="text-[#10b981] text-sm font-bold bg-white px-3 py-1 rounded-lg border active:rotate-180 transition-transform duration-500">
                <i class="fas fa-sync-alt"></i> อัปเดตสต็อก
            </button>
        </div>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-6 right-6 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden active:scale-90 transition-all">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div id="cartSummarySection">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="text-xl font-bold">ตะกร้าของคุณ</h3>
                    <button onclick="closeCart()" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-4 space-y-3 overflow-y-auto max-h-[40vh]"></div>
                <div class="p-6 bg-gray-50 space-y-4">
                    <div class="flex justify-between font-bold text-2xl px-2">
                        <span>ยอดรวม</span>
                        <span id="displayTotal" class="text-[#10b981]">0 ฿</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex-1 text-center bg-white border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden"> 
                            <span class="text-sm font-bold">เงินสด</span>
                        </label>
                        <label class="flex-1 text-center bg-white border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                            <input type="radio" name="payType" value="สแกนจ่าย" class="hidden"> 
                            <span class="text-sm font-bold">สแกนจ่าย</span>
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">ยืนยันการสั่งซื้อ</button>
                </div>
            </div>

            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white">
                <p class="text-gray-400 mb-1">ยอดชำระสแกนจ่าย</p>
                <p class="font-bold text-3xl mb-6 text-green-600" id="qrFinalTotal">0 ฿</p>
                <div class="bg-white p-2 rounded-2xl mb-8 w-60 h-60 mx-auto border-2 border-dashed border-green-200 flex items-center justify-center">
                    <img id="qrDisplayImg" src="" class="w-full h-full object-contain hidden">
                    <div id="qrNoImgMsg" class="text-xs text-gray-400">กำลังดึง QR Code...</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="openCart()" class="flex-1 bg-gray-100 py-4 rounded-xl font-bold text-gray-500">ย้อนกลับ</button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">บันทึกสำเร็จ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznnNLlrN_mMJAzOd14L6u1G2Ey0klUNP4Go7jU_zg_Giqv5sX4l7HG8ZKSUIfjMbeArw/exec";
        
        let products = [];
        let qrCodeImg = "";
        let currentUser = null;

        // ฟังก์ชันโหลดข้อมูลแบบ Optimize
        async function syncData(isFirstLoad = false) {
            if(!isFirstLoad) showLoading(true);
            try {
                const resp = await fetch(`${SCRIPT_URL}?action=getInitialData`);
                const data = await resp.json();
                
                // เก็บสต็อกเดิมไว้เทียบ (Optional)
                products = data.products.map((p, i) => ({
                    id: i, name: p[0], price: p[1], stock: p[2], img: p[3], qty: 0
                }));
                qrCodeImg = data.qr;
                renderShop();
            } catch (err) {
                console.error("Sync Error:", err);
            }
            showLoading(false);
        }

        async function initApp() {
            const savedUser = localStorage.getItem('pos_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('userBadge').innerText = currentUser.name;
                document.getElementById('shopView').classList.remove('hidden');
                // โหลดข้อมูลแบบ Background
                syncData(true);
            }
        }

        async function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if(!pin) return;
            showLoading(true);
            try {
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', pin: pin })
                });
                const result = await resp.json();
                if (result.success) {
                    currentUser = { name: result.name, role: result.role, pin: pin };
                    localStorage.setItem('pos_user', JSON.stringify(currentUser));
                    location.reload(); // รีโหลดเพื่อให้ syncData ทำงานสะอาดที่สุด
                } else {
                    alert("รหัส PIN ผิดพลาด");
                }
            } catch (e) { alert("เชื่อมต่อไม่ได้"); }
            showLoading(false);
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => {
                const isOut = p.stock <= 0;
                return `
                <div class="product-card border ${isOut ? 'bg-gray-50 opacity-60' : 'border-green-50 shadow-sm'}">
                    <div class="relative">
                        <img src="${p.img || 'https://via.placeholder.com/150'}" loading="lazy">
                        ${isOut ? '<span class="absolute inset-0 flex items-center justify-center bg-black/40 text-white font-bold rounded-xl text-xs">หมด</span>' : ''}
                    </div>
                    <div class="mt-2">
                        <p class="text-xs font-bold text-gray-700 truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400">คงเหลือ: ${p.stock}</p>
                    </div>
                    <div class="flex justify-between items-end mt-1">
                        <p class="text-sm font-black text-gray-900">${p.price}.-</p>
                        <div class="flex items-center gap-2">
                            ${p.qty > 0 ? `<button onclick="updateQty(${p.id}, -1)" class="w-7 h-7 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-xs"><i class="fas fa-minus"></i></button><span class="font-bold text-xs">${p.qty}</span>` : ''}
                            <button onclick="updateQty(${p.id}, 1)" ${isOut ? 'disabled' : ''} class="w-8 h-8 bg-[#10b981] text-white rounded-full flex items-center justify-center shadow-md"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            updateCartBadge();
        }

        function updateQty(id, change) {
            const p = products[id];
            if (change > 0 && p.qty >= p.stock) return alert('สินค้าไม่พอ!');
            p.qty = Math.max(0, p.qty + change);
            renderShop();
            if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
        }

        function updateCartBadge() {
            const totalQty = products.reduce((sum, p) => sum + p.qty, 0);
            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartFloatBtn').classList.toggle('hidden', totalQty === 0);
        }

        function openCart() {
            document.getElementById('cartModal').classList.remove('hidden');
            document.getElementById('cartSummarySection').classList.remove('hidden');
            document.getElementById('qrCheckoutSection').classList.add('hidden');
            renderCartItems();
        }

        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            const container = document.getElementById('cartItemsList');
            let sum = 0;
            container.innerHTML = list.map(p => {
                sum += (p.price * p.qty);
                return `<div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-1"><p class="text-xs font-bold">${p.name}</p><p class="text-[10px] text-gray-400">${p.price}฿</p></div>
                    <div class="flex items-center gap-3 text-xs">
                        <button onclick="updateQty(${p.id}, -1)" class="text-red-400"><i class="fas fa-minus-circle"></i></button>
                        <span class="font-bold">${p.qty}</span>
                        <button onclick="updateQty(${p.id}, 1)" class="text-green-500"><i class="fas fa-plus-circle"></i></button>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-gray-400 text-sm italic">ไม่มีสินค้าในตะกร้า</p>';
            document.getElementById('displayTotal').innerText = `${sum} ฿`;
        }

        function goToCheckout() {
            const total = products.reduce((sum, p) => sum + (p.price * p.qty), 0);
            if(total === 0) return;
            const type = document.querySelector('input[name="payType"]:checked').value;
            if(type === 'สแกนจ่าย') {
                document.getElementById('cartSummarySection').classList.add('hidden');
                document.getElementById('qrCheckoutSection').classList.remove('hidden');
                document.getElementById('qrFinalTotal').innerText = `${total} ฿`;
                if(qrCodeImg) {
                    document.getElementById('qrDisplayImg').src = qrCodeImg;
                    document.getElementById('qrDisplayImg').classList.remove('hidden');
                    document.getElementById('qrNoImgMsg').classList.add('hidden');
                }
            } else { finishOrder(); }
        }

        async function finishOrder() {
            const cartItems = products.filter(p => p.qty > 0);
            const orderData = {
                action: 'checkout',
                items: cartItems.map(p => `${p.name} (${p.qty})`).join(', '),
                totalQty: cartItems.reduce((sum, p) => sum + p.qty, 0),
                totalPrice: cartItems.reduce((sum, p) => sum + (p.price * p.qty), 0),
                payType: document.querySelector('input[name="payType"]:checked').value,
                seller: currentUser.name,
                cart: cartItems
            };

            showLoading(true);
            try {
                const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) });
                const result = await resp.json();
                if(result.success) {
                    // ล้างตะกร้าก่อน เพื่อความไวในการกลับไปขายต่อ
                    products.forEach(p => p.qty = 0);
                    renderShop();
                    updateCartBadge();
                    closeCart();
                    // แล้วค่อย Sync สต็อกจริงจาก Sheets แบบเงียบๆ (Background)
                    syncData(true); 
                }
            } catch (e) { alert("บันทึกข้อมูลล้มเหลว"); }
            showLoading(false);
        }

        function handleLogout() { localStorage.removeItem('pos_user'); location.reload(); }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }
        function showLoading(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        function toggleView(view) { document.getElementById('shopView').classList.toggle('hidden', view !== 'shop'); }

        initApp();
    </script>
</body>
</html>
