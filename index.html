<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS By Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; transition: all 0.3s; }
        
        body.light-mode { background-color: #f0fdf4; color: #1f2937; }
        body.dark-mode { background-color: #121212; color: #f9fafb; }
        
        .bg-card { background-color: white; }
        body.dark-mode .bg-card { background-color: #1e1e1e; border-color: #333; }
        
        .product-card { 
            aspect-ratio: 1 / 1; border-radius: 1.5rem; transition: all 0.3s; padding: 1rem;
            display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #10b981; }
        .product-card img { border-radius: 1rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; pointer-events: none; }
        
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; }
        
        /* สวิตช์เปิด-ปิด */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(26px); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-animation { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="light-mode">

    <div id="loader" class="hidden"><div class="animate-spin rounded-full h-16 w-16 border-t-4 border-[#10b981]"></div></div>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <div class="flex items-center gap-2">
            <div id="userBox" class="bg-white px-4 py-2 rounded-full shadow-sm border flex items-center gap-3 dark:bg-[#1e1e1e] dark:border-[#444]">
                <button onclick="openAdminSettings()" class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="userBadge" class="text-sm font-bold text-gray-700 dark:text-white">User</span>
                </button>
                <button onclick="toggleDarkMode()" id="themeBtn" class="text-gray-400 border-l pl-2 ml-1">
                    <i class="fas fa-moon text-xs"></i>
                </button>
            </div>
        </div>
        <button onclick="handleLogout()" class="text-red-400 text-sm font-bold bg-white px-4 py-2 rounded-full border shadow-sm dark:bg-[#1e1e1e] dark:border-[#444]">ออกจากระบบ</button>
    </nav>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-end sm:items-center justify-center">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            
            <div id="cartSummarySection">
                <div class="p-6 border-b dark:border-[#333] flex justify-between items-center">
                    <h3 class="text-xl font-bold text-gray-800 dark:text-white">ตะกร้าของคุณ</h3>
                    <button onclick="closeCart()" class="text-gray-400 text-3xl">&times;</button>
                </div>
                
                <div id="cartItemsList" class="p-4 space-y-3 overflow-y-auto max-h-[40vh]"></div>

                <div class="p-6 bg-gray-50 dark:bg-[#252525] border-t dark:border-[#333]">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <p class="text-sm text-gray-400">ยอดชำระทั้งหมด</p>
                            <p id="displayTotal" class="text-3xl font-bold text-[#10b981]">0 ฿</p>
                        </div>
                        <button onclick="clearCart()" class="text-red-500 bg-red-50 dark:bg-red-900/20 p-3 rounded-xl active:scale-90 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <label class="relative flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-gray-100 dark:border-[#444] bg-white dark:bg-[#333] cursor-pointer text-gray-800 dark:text-white">
                            <input type="radio" name="payType" value="เงินสด" checked class="absolute opacity-0">
                            <i class="fas fa-money-bill-wave text-xl mb-1"></i>
                            <span class="text-xs font-bold">เงินสด</span>
                        </label>
                        <label class="relative flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-gray-100 dark:border-[#444] bg-white dark:bg-[#333] cursor-pointer text-gray-800 dark:text-white">
                            <input type="radio" name="payType" value="สแกนจ่าย" class="absolute opacity-0">
                            <i class="fas fa-qrcode text-xl mb-1"></i>
                            <span class="text-xs font-bold">สแกนจ่าย</span>
                        </label>
                    </div>

                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">ชำระเงิน</button>
                </div>
            </div>

            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white dark:bg-[#1e1e1e]">
                <h4 class="text-gray-800 dark:text-white font-bold text-xl mb-1">สแกนจ่ายเงิน</h4>
                <p id="qrFinalTotal" class="text-4xl font-bold text-[#10b981] mb-6">0 ฿</p>
                
                <div class="bg-white p-4 rounded-3xl mb-8 w-64 h-64 mx-auto border-2 border-gray-100 shadow-inner flex items-center justify-center">
                    <img id="qrDisplayImg" src="" class="w-full h-full object-contain hidden">
                    <div id="qrNoImgMsg" class="text-gray-300">กำลังสร้าง QR...</div>
                </div>

                <div class="flex gap-3">
                    <button onclick="backToCartSummary()" class="flex-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">
                        กลับ
                    </button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                        เสร็จสิ้น
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชัน renderCartItems ที่ปรับปรุงใหม่
        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            const container = document.getElementById('cartItemsList');
            const { final } = calculateTotal();

            container.innerHTML = list.map(p => `
                <div class="flex items-center gap-3 bg-gray-50 dark:bg-[#333] p-3 rounded-2xl border dark:border-[#444]">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-gray-800 dark:text-white truncate">${p.name}</p>
                        <p class="text-xs text-gray-400">${p.price} ฿</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty(${p.id}, -1)" class="text-red-400 p-1"><i class="fas fa-minus-circle text-lg"></i></button>
                        <span class="font-bold text-gray-800 dark:text-white w-4 text-center">${p.qty}</span>
                        <button onclick="updateQty(${p.id}, 1)" class="text-green-500 p-1"><i class="fas fa-plus-circle text-lg"></i></button>
                    </div>
                </div>`).join('') || '<p class="text-center py-8 text-gray-400">ตะกร้าว่างเปล่า</p>';

            document.getElementById('displayTotal').innerText = `${final} ฿`;
        }

        // เพิ่ม Style ดักจับ Radio Button ที่ถูกเลือก
        const style = document.createElement('style');
        style.innerHTML = `
            label:has(input:checked) {
                border-color: #10b981 !important;
                background-color: rgba(16, 185, 129, 0.1) !important;
            }
        `;
        document.head.appendChild(style);
        
        // ... (ใส่ฟังก์ชันอื่นๆ ที่เหลือจากโค้ดเดิมของคุณ) ...
    </script>
</body>
</html>
