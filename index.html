<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS By Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; transition: background-color 0.3s; }
        
        /* สไตล์หลัก */
        body.light-mode { background-color: #f0fdf4; color: #1f2937; }
        body.dark-mode { background-color: #121212; color: #f9fafb; }
        
        /* หน้า Login ล็อคสีเดิม (บังคับ Light Mode) */
        #loginView { background-color: #f0fdf4 !important; color: #1f2937 !important; }
        #loginCard { background-color: white !important; color: #1f2937 !important; }
        #loginPin { background-color: white !important; color: #1f2937 !important; border-color: #f0fdf4 !important; }

        .bg-card { background-color: white; }
        body.dark-mode .bg-card { background-color: #1e1e1e; border: 1px solid #333; }
        
        .product-card { 
            aspect-ratio: 1 / 1; border-radius: 1.5rem; transition: all 0.3s; padding: 1rem;
            display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent;
            cursor: pointer;
        }
        .product-card img { border-radius: 1rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; pointer-events: none; }
        
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
        
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body class="light-mode">
    <script>
        // เช็คโหมดมืดเฉพาะส่วนที่ไม่ได้อยู่ในหน้า Login
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.replace('light-mode', 'dark-mode');
        }
    </script>

    <div id="loader" class="hidden"><div class="animate-spin rounded-full h-16 w-16 border-t-4 border-[#10b981]"></div></div>

    <section id="loginView" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div id="loginCard" class="p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-24 h-24 bg-[#10b981] rounded-full flex items-center justify-center mx-auto mb-6 text-white text-4xl">
                <i class="fas fa-store"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">เข้าสู่ระบบ</h2>
            <p class="text-gray-400 text-sm mb-4">กรุณากรอกรหัส PIN</p>
            <input type="tel" id="loginPin" placeholder="••••••" maxlength="6" style="-webkit-text-security: disc;"
                   class="w-full border-2 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] outline-none focus:border-[#10b981] mb-4">
            <button onclick="handleLogin()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">เข้าสู่ระบบ</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <div id="userBox" class="bg-white px-4 py-2 rounded-full shadow-sm border flex items-center gap-3 dark:bg-[#1e1e1e] dark:border-[#333]">
            <button onclick="openAdminSettings()" class="flex items-center gap-2">
                <span id="userBadge" class="text-sm font-bold text-gray-700 dark:text-white">User</span>
            </button>
            <button onclick="toggleDarkMode()" id="themeBtn" class="text-gray-400 border-l pl-2"><i class="fas fa-moon text-xs"></i></button>
        </div>
        <button onclick="handleLogout()" class="text-red-400 text-sm font-bold bg-white px-4 py-2 rounded-full border shadow-sm dark:bg-[#1e1e1e] dark:border-[#333]">ออกจากระบบ</button>
    </nav>

    <section id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <h1 class="text-2xl font-bold mb-6 mt-4 dark:text-white">รายการสินค้า</h1>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-8 right-8 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden active:scale-90 transition-all">
        <i class="fas fa-shopping-basket"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-xs w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-end sm:items-center justify-center">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-t-[3rem] sm:rounded-[3rem] overflow-hidden flex flex-col max-h-[90vh]">
            <div id="cartSummarySection">
                <div class="p-8 border-b dark:border-[#333] flex justify-between items-center">
                    <h3 class="text-2xl font-bold dark:text-white">ตะกร้าสินค้า</h3>
                    <button onclick="closeCart()" class="text-gray-300 text-4xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-6 space-y-4 overflow-y-auto max-h-[40vh]"></div>
                <div class="p-8 bg-gray-50 dark:bg-[#252525] space-y-4">
                    <div class="flex justify-between items-center">
                        <span id="displayTotal" class="text-[#10b981] text-3xl font-bold">0 ฿</span>
                        <button onclick="clearCart()" class="text-red-500"><i class="fas fa-trash-alt text-xl"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="bg-white dark:bg-[#333] border-2 dark:border-[#444] p-4 rounded-2xl text-center cursor-pointer dark:text-white">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden">เงินสด
                        </label>
                        <label class="bg-white dark:bg-[#333] border-2 dark:border-[#444] p-4 rounded-2xl text-center cursor-pointer dark:text-white">
                            <input type="radio" name="payType" value="สแกนจ่าย" class="hidden">สแกนจ่าย
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-5 rounded-2xl font-bold text-lg active:scale-95">ชำระเงิน</button>
                </div>
            </div>
            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white dark:bg-[#1e1e1e]">
                <p id="qrFinalTotal" class="text-4xl font-bold text-green-600 mb-6">0 ฿</p>
                <img id="qrDisplayImg" src="" class="w-64 h-64 mx-auto mb-8 hidden">
                <div class="flex gap-3">
                    <button onclick="backToCartSummary()" class="flex-1 bg-gray-100 py-4 rounded-2xl">กลับ</button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold">เสร็จสิ้น</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznnNLlrN_mMJAzOd14L6u1G2Ey0klUNP4Go7jU_zg_Giqv5sX4l7HG8ZKSUIfjMbeArw/exec";
        let products = [];
        let currentUser = null;

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode', !isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        async function initApp() {
            showLoading(true);
            const savedUser = localStorage.getItem('pos_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('shopView').classList.remove('hidden');
                document.getElementById('userBadge').innerText = currentUser.name;
            }
            try {
                const resp = await fetch(`${SCRIPT_URL}?action=getInitialData`);
                const data = await resp.json();
                products = data.products.map((p, i) => ({
                    id: i, name: p[0], price: p[1], stock: p[2], img: p[3], qty: 0
                }));
                renderShop();
            } catch (err) { console.error(err); }
            showLoading(false);
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-card ${p.stock <= 0 ? 'opacity-50 pointer-events-none' : ''}" onclick="updateQty(${p.id}, 1)">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div class="mt-3">
                        <p class="text-sm font-bold truncate dark:text-white">${p.name}</p>
                        <p class="text-xs text-gray-400">คลัง: ${p.stock}</p>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-lg font-bold text-[#10b981]">${p.price}฿</p>
                        <div class="flex items-center gap-2" onclick="event.stopPropagation()">
                            ${p.qty > 0 ? `
                                <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 bg-red-100 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-minus"></i></button>
                                <span class="font-bold dark:text-white">${p.qty}</span>
                            ` : ''}
                            <button onclick="updateQty(${p.id}, 1)" class="w-10 h-10 bg-[#10b981] text-white rounded-full flex items-center justify-center shadow-md"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>`).join('');
            updateCartBadge();
        }

        function updateQty(id, change) {
            const p = products[id];
            if (change > 0 && p.qty >= p.stock) return;
            p.qty = Math.max(0, p.qty + change);
            renderShop();
            if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
        }

        async function finishOrder() {
            showLoading(true);
            const orderData = {
                action: 'checkout',
                totalPrice: products.reduce((s, p) => s + (p.price * p.qty), 0),
                payType: document.querySelector('input[name="payType"]:checked').value,
                seller: currentUser.name,
                cart: products.filter(p => p.qty > 0)
            };
            try {
                const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) });
                if((await resp.json()).success) {
                    closeCart();
                    await initApp(); // โหลดข้อมูลใหม่ (ไม่มี alert แล้ว)
                }
            } catch (e) { alert("ล้มเหลว"); }
            showLoading(false);
        }

        // ฟังก์ชันพื้นฐานอื่นๆ
        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); renderCartItems(); }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }
        function updateCartBadge() { const total = products.reduce((s,p) => s+p.qty, 0); document.getElementById('cartCount').innerText = total; document.getElementById('cartFloatBtn').classList.toggle('hidden', total === 0); }
        function showLoading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function handleLogin() { /* โค้ด Login เดิม */ localStorage.setItem('pos_user', JSON.stringify({name:'Admin'})); location.reload(); }
        function handleLogout() { localStorage.removeItem('pos_user'); location.reload(); }
        function renderCartItems() { /* เรนเดอร์รายการในตะกร้า */ document.getElementById('displayTotal').innerText = products.reduce((s,p)=>s+(p.price*p.qty),0) + " ฿"; }
        function goToCheckout() { /* Logic สลับหน้า QR หรือจบงาน */ finishOrder(); }

        initApp();
    </script>
</body>
</html>
