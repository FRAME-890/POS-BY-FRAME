<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS by frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fef3c7; }
        .product-card { aspect-ratio: 1/1; border-radius: 1rem; transition: all 0.2s; background: white; padding: 1rem; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .product-card img { border-radius: 0.75rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 0.75rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center">
        <div class="animate-spin text-orange-500 text-4xl mb-4"><i class="fas fa-circle-notch"></i></div>
        <p class="text-gray-500 animate-pulse">กำลังเชื่อมต่อฐานข้อมูล Sheets...</p>
    </div>

    <section id="loginView" class="fixed inset-0 bg-orange-100 z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-orange-400 rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl">
                <i class="fas fa-user-lock"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">เข้าสู่ระบบ</h2>
            <p class="text-gray-400 text-sm mb-6">กรุณาใส่ PIN เพื่อเริ่มขายสินค้า</p>
            <input type="password" id="loginPin" placeholder="รหัส PIN" class="w-full border-2 border-gray-100 p-4 rounded-2xl text-center text-2xl tracking-[0.5em] outline-none mb-4">
            <button onclick="handleLogin()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ยืนยัน</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <button onclick="openMenu()" class="text-2xl text-gray-700"><i class="fas fa-bars"></i></button>
        <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm border">
            <span id="userBadge" class="text-xs font-bold text-orange-600 italic">User</span>
            <button onclick="handleLogout()" class="text-gray-400 text-[10px] underline">Logout</button>
        </div>
    </nav>

    <div id="sideMenu" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" onclick="closeMenu()">
        <div class="bg-white w-64 h-full p-5 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-6 border-b pb-4">เมนูหลัก</h2>
            <button onclick="toggleView('shop')" class="block w-full text-left py-3 px-4 hover:bg-orange-50 rounded-xl mb-2"><i class="fas fa-store mr-3 text-orange-500"></i> หน้าขายสินค้า</button>
            <p class="text-[10px] text-gray-400 mt-10 p-4 border-t">แก้ไขข้อมูลพนักงานและสินค้าได้ที่ Google Sheets ของเฟรม</p>
        </div>
    </nav>

    <section id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <h1 class="text-xl font-bold mb-4">รายการสินค้า</h1>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-8 right-8 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden hover:scale-110 active:scale-90 transition-all">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
            <div id="cartSummarySection">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="text-xl font-bold">รายการในรถเข็น</h3>
                    <button onclick="closeCart()" class="text-gray-400 text-3xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-6 space-y-3 overflow-y-auto max-h-[40vh]"></div>
                <div class="p-6 bg-gray-50 border-t space-y-4">
                    <div class="flex justify-between font-bold text-xl">
                        <span>ยอดรวมทั้งหมด:</span>
                        <span id="displayTotal">0 ฿</span>
                    </div>
                    <div class="flex gap-2">
                        <label class="flex-1 text-center bg-white border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500 transition-all">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden"> <span class="text-sm font-medium">เงินสด</span>
                        </label>
                        <label class="flex-1 text-center bg-white border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500 transition-all">
                            <input type="radio" name="payType" value="โอนสแกน" class="hidden"> <span class="text-sm font-medium">QR PromptPay</span>
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-600 transition-all">ชำระเงิน</button>
                </div>
            </div>
            
            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/PromptPay-logo.png" class="h-6 mx-auto mb-4">
                <p class="font-bold text-2xl mb-1 text-green-600" id="qrFinalTotal">0 ฿</p>
                <div class="bg-gray-100 p-4 rounded-3xl mb-8 w-48 h-48 mx-auto flex items-center justify-center border-2 border-dashed border-gray-300">
                    <img id="qrDisplayImg" src="" class="w-full h-full object-contain hidden">
                    <span id="qrNoImgMsg" class="text-[10px] text-red-400 px-4">ยังไม่ได้ตั้งค่า QR Code</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="openCart()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">กลับ</button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-bold">ยืนยันรับเงิน</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL Script ที่เฟรมส่งมา
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxx-VY3gvvPO3lJpmlxhjqB3iPQxWzf07RGmzgsrE8xbJA7vP-XgmfLRKBUgL23V800Bw/exec';
        
        let appUsers = {};
        let products = [];
        let currentUser = null;
        let qrCodeImg = localStorage.getItem('qrCodeImg') || '';

        // --- 1. โหลดข้อมูลจาก Sheets ทันที ---
        async function initSystem() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                // โหลด Users (PIN, ชื่อ, บทบาท)
                data.users.forEach(u => {
                    appUsers[u[0]] = { name: u[1], role: u[2] };
                });

                // โหลด Products (ID, ชื่อ, ราคา, สต็อก, รูป)
                products = data.products.map(p => ({
                    id: p[0], name: p[1], price: p[2], stock: p[3], img: p[4], qty: 0
                }));

                // ซ่อน Loading และโชว์หน้า Login
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('loginView').classList.remove('hidden');
                renderShop();
            } catch (e) {
                alert("เชื่อมต่อฐานข้อมูลไม่สำเร็จ! ตรวจสอบการ Deploy ของเฟรมอีกครั้ง");
                console.error(e);
            }
        }

        function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if (appUsers[pin]) {
                currentUser = { ...appUsers[pin], pin };
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('userBadge').innerText = currentUser.name;
                toggleView('shop');
            } else { alert('PIN ไม่ถูกต้อง หรือไม่มีในระบบ!'); }
        }

        function handleLogout() { location.reload(); }

        function toggleView(view) {
            closeMenu();
            document.getElementById('shopView').classList.toggle('hidden', view !== 'shop');
            if(view === 'shop') renderShop();
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => {
                const isOut = p.stock <= 0;
                return `
                <div class="product-card ${isOut ? 'opacity-60 grayscale' : ''}">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    ${isOut ? '<div class="absolute top-2 left-2 bg-red-600 text-white text-[8px] px-2 py-1 rounded-full font-bold">หมด</div>' : ''}
                    <div class="flex justify-between items-end">
                        <div class="flex-1 truncate pr-2">
                            <p class="text-[10px] text-gray-400 truncate">${p.name}</p>
                            <p class="text-[9px] font-bold ${p.stock < 5 ? 'text-red-500' : 'text-blue-500'}">สต็อก: ${p.stock}</p>
                            <p class="text-sm font-bold text-gray-900">${p.price} ฿</p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="updateQty('${p.id}', -1)" class="bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center ${p.qty === 0 ? 'hidden' : ''}"><i class="fas fa-minus text-[8px]"></i></button>
                            <span class="text-green-600 font-bold text-xs ${p.qty === 0 ? 'hidden' : ''}">${p.qty}</span>
                            <button onclick="updateQty('${p.id}', 1)" ${isOut ? 'disabled' : ''} class="bg-[#10b981] text-white w-7 h-7 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<p class="col-span-full text-center py-20">ไม่มีข้อมูลสินค้า</p>';
            updateCartBadge();
        }

        function updateQty(id, change) {
            const p = products.find(i => i.id == id);
            if(p) {
                if (change > 0 && p.qty >= p.stock) return alert('สต็อกไม่พอ!');
                p.qty = Math.max(0, p.qty + change);
                renderShop();
                if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
            }
        }

        function updateCartBadge() {
            const totalQty = products.reduce((sum, p) => sum + p.qty, 0);
            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartFloatBtn').classList.toggle('hidden', totalQty === 0);
        }

        function openCart() {
            document.getElementById('cartModal').classList.remove('hidden');
            document.getElementById('cartSummarySection').classList.remove('hidden');
            document.getElementById('qrCheckoutSection').classList.add('hidden');
            renderCartItems();
        }

        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }

        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            const container = document.getElementById('cartItemsList');
            let sum = 0;
            container.innerHTML = list.map(p => {
                sum += (p.price * p.qty);
                return `
                <div class="flex items-center gap-3 bg-white p-3 rounded-2xl border">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-1 truncate">
                        <p class="text-xs font-bold text-gray-700 truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400">${p.price} ฿</p>
                    </div>
                    <div class="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-xl">
                        <button onclick="updateQty('${p.id}', -1)" class="text-red-500"><i class="fas fa-minus-circle"></i></button>
                        <span class="text-sm font-bold w-4 text-center">${p.qty}</span>
                        <button onclick="updateQty('${p.id}', 1)" class="text-green-500"><i class="fas fa-plus-circle"></i></button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('displayTotal').innerText = `${sum} ฿`;
        }

        function goToCheckout() {
            const total = products.reduce((sum, p) => sum + (p.price * p.qty), 0);
            const type = document.querySelector('input[name="payType"]:checked').value;
            if(type === 'โอนสแกน') {
                document.getElementById('cartSummarySection').classList.add('hidden');
                document.getElementById('qrCheckoutSection').classList.remove('hidden');
                document.getElementById('qrFinalTotal').innerText = `${total} ฿`;
            } else { finishOrder(); }
        }

        async function finishOrder() {
            const cartItems = products.filter(p => p.qty > 0);
            const items = cartItems.map(p => `${p.name} (${p.qty})`).join(', ');
            const totalQty = cartItems.reduce((sum, p) => sum + p.qty, 0);
            const totalPrice = cartItems.reduce((sum, p) => sum + (p.price * p.qty), 0);
            const payType = document.querySelector('input[name="payType"]:checked').value;

            // ตัดสต็อกและสรุปยอดคงเหลือ
            let stockStatusArray = [];
            products.forEach(p => {
                if(p.qty > 0) {
                    p.stock -= p.qty;
                    stockStatusArray.push(`${p.name} เหลือ ${p.stock}`);
                    p.qty = 0;
                }
            });
            const stockStatus = stockStatusArray.join(', ');

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ items, totalQty, totalPrice, payType, seller: currentUser.name, stockStatus })
                });
                alert('ชำระเงินเรียบร้อย! ข้อมูลบันทึกเข้า Sheets แล้ว');
            } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล"); }

            closeCart();
            renderShop();
        }

        function openMenu() { document.getElementById('sideMenu').classList.remove('hidden'); }
        function closeMenu() { document.getElementById('sideMenu').classList.add('hidden'); }

        // เริ่มระบบ
        initSystem();
    </script>
</body>
</html>
