<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANC Shop POS & Stock System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fef3c7; }
        .product-card { 
            border-radius: 1.5rem; 
            transition: all 0.3s; 
            background-color: white;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <section id="loginView" class="fixed inset-0 bg-orange-100 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-orange-400 rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl shadow-lg">
                <i class="fas fa-user-lock"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 tracking-wide text-gray-800">เข้าสู่ระบบ</h2>
            <p class="text-gray-400 text-xs mb-6">กรุณาใส่รหัส PIN (รหัสเริ่มต้น 9999)</p>
            <input type="password" id="loginPin" inputmode="numeric" placeholder="••••" class="w-full border-2 border-gray-100 p-4 rounded-2xl text-center text-3xl tracking-[0.3em] outline-none mb-4 focus:border-orange-400 transition-all">
            <button onclick="handleLogin()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ตกลง</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <button onclick="openMenu()" class="text-2xl text-gray-700 w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm"><i class="fas fa-bars"></i></button>
        <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm border border-orange-100">
            <span id="userBadge" class="text-xs font-bold text-orange-600">User</span>
            <button onclick="handleLogout()" class="text-gray-400 text-[10px] underline">Logout</button>
        </div>
    </nav>

    <div id="sideMenu" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" onclick="closeMenu()">
        <div class="bg-white w-72 h-full p-6 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-8 border-b pb-4"><i class="fas fa-th-large text-orange-500 mr-2"></i>เมนู</h2>
            <button onclick="toggleView('shop')" class="flex items-center w-full py-4 px-4 hover:bg-orange-50 rounded-2xl mb-2 transition-all"><i class="fas fa-store mr-4 text-orange-500"></i>หน้าขายสินค้า</button>
            <div id="adminOnlyMenu" class="hidden">
                <button onclick="toggleView('admin')" class="flex items-center w-full py-4 px-4 hover:bg-blue-50 rounded-2xl text-blue-600 mb-2 transition-all"><i class="fas fa-boxes-stacked mr-4"></i>คลังสินค้า & สต็อก</button>
                <button onclick="toggleView('users')" class="flex items-center w-full py-4 px-4 hover:bg-red-50 rounded-2xl text-red-600 transition-all"><i class="fas fa-users-cog mr-4"></i>จัดการพนักงาน</button>
            </div>
        </div>
    </div>

    <section id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <h1 class="text-xl font-bold text-gray-800 mb-6">รายการสินค้า</h1>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </section>

    <section id="adminView" class="container mx-auto px-4 pb-10 hidden">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl border">
            <h1 class="text-lg font-bold text-blue-600">จัดการสต็อก</h1>
            <button onclick="openProductModal()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">+ เพิ่มสินค้า</button>
        </div>
        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase">
                    <tr><th class="p-4">รูป</th><th class="p-4">ชื่อ/สต็อก</th><th class="p-4 text-right">ราคา</th><th class="p-4 text-center">จัดการ</th></tr>
                </thead>
                <tbody id="adminTableBody" class="divide-y divide-gray-50 text-sm"></tbody>
            </table>
        </div>
        <div class="mt-4 p-4 bg-white rounded-2xl border text-xs">
             <b>QR PromptPay:</b> <input type="file" id="qrInput" class="ml-2">
        </div>
    </section>

    <section id="usersView" class="container mx-auto px-4 pb-10 hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-red-600">พนักงาน</h1>
            <button onclick="openUserModal()" class="bg-red-500 text-white px-5 py-2 rounded-full text-xs font-bold">+ เพิ่มคน</button>
        </div>
        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] text-gray-400">
                    <tr><th class="p-4">ชื่อ</th><th class="p-4">ตำแหน่ง</th><th class="p-4">PIN</th><th class="p-4 text-center">จัดการ</th></tr>
                </thead>
                <tbody id="userTableBody" class="text-sm"></tbody>
            </table>
        </div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-8 right-8 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden border-4 border-white">
        <i class="fas fa-shopping-basket"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
            <div id="cartSummarySection" class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">ตะกร้า</h3>
                    <button onclick="closeCart()" class="text-3xl">&times;</button>
                </div>
                <div id="cartItemsList" class="space-y-3 max-h-[40vh] overflow-y-auto mb-4"></div>
                <div class="border-t pt-4">
                    <div class="flex justify-between font-bold text-2xl mb-4"><span>รวม:</span><span id="displayTotal">0 ฿</span></div>
                    <div class="flex gap-2 mb-4">
                        <label class="flex-1 text-center border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden"> เงินสด
                        </label>
                        <label class="flex-1 text-center border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500">
                            <input type="radio" name="payType" value="โอนสแกน" class="hidden"> สแกนจ่าย
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold">ยืนยัน</button>
                </div>
            </div>
            
            <div id="qrCheckoutSection" class="hidden p-8 text-center">
                <p class="font-bold text-3xl mb-4 text-green-600" id="qrFinalTotal">0 ฿</p>
                <img id="qrDisplayImg" src="" class="w-48 h-48 mx-auto mb-6 hidden border p-2">
                <p id="qrNoImgMsg" class="text-red-500 mb-6 text-xs">ยังไม่แนบรูป QR ในหน้าแอดมิน</p>
                <div class="flex gap-2">
                    <button onclick="openCart()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">กลับ</button>
                    <button onclick="finishOrder()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">ชำระแล้ว</button>
                </div>
            </div>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm">
            <h3 class="font-bold mb-4">ข้อมูลสินค้า</h3>
            <div class="space-y-3 text-sm">
                <input type="text" id="pName" placeholder="ชื่อสินค้า" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input type="number" id="pPrice" placeholder="ราคา" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input type="number" id="pStock" placeholder="สต็อกที่มี" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input type="file" id="pImgFile" class="w-full border p-2 rounded-xl">
            </div>
            <div class="flex justify-end mt-6 gap-3">
                <button onclick="closeProductModal()">ยกเลิก</button>
                <button id="saveProdBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm">
            <h3 class="font-bold mb-4">พนักงาน</h3>
            <div class="space-y-3">
                <input type="text" id="uName" placeholder="ชื่อ" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input type="text" id="uPin" placeholder="รหัส PIN" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <select id="uRole" class="w-full bg-gray-50 p-3 rounded-xl outline-none"><option value="staff">Staff</option><option value="admin">Admin</option></select>
            </div>
            <div class="flex justify-end mt-6 gap-3">
                <button onclick="closeUserModal()">ยกเลิก</button>
                <button id="saveUserBtn" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const initialUsers = { "9999": { name: "คุณเฟรม", role: "admin" } };
        let appUsers = JSON.parse(localStorage.getItem('appUsers')) || initialUsers;
        let products = JSON.parse(localStorage.getItem('myProducts')) || [];
        let qrCodeImg = localStorage.getItem('qrCodeImg') || '';
        let currentUser = null, editProdId = null, editUserPinId = null;

        function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if (appUsers[pin]) {
                currentUser = { ...appUsers[pin], pin };
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('userBadge').innerText = currentUser.name;
                document.getElementById('adminOnlyMenu').classList.toggle('hidden', currentUser.role !== 'admin');
                toggleView('shop');
            } else { alert('PIN ไม่ถูกต้อง'); }
        }
        function handleLogout() { location.reload(); }

        function openMenu() { document.getElementById('sideMenu').classList.remove('hidden'); }
        function closeMenu() { document.getElementById('sideMenu').classList.add('hidden'); }
        function toggleView(view) {
            closeMenu();
            ['shopView', 'adminView', 'usersView'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(view + 'View').classList.remove('hidden');
            if(view === 'shop') renderShop();
            if(view === 'admin') renderAdmin();
            if(view === 'users') renderUserTable();
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => {
                const qty = p.qty || 0, stock = p.stock || 0, isOut = stock <= 0;
                return `
                <div class="product-card ${isOut ? 'opacity-50' : ''}">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div>
                        <p class="text-[10px] text-gray-400 truncate">${p.name}</p>
                        <p class="text-[10px] font-bold ${stock < 5 ? 'text-red-500' : 'text-blue-500'}">สต็อก: ${stock}</p>
                        <p class="text-sm font-bold">${p.price} ฿</p>
                    </div>
                    <div class="flex items-center justify-between mt-2">
                        <button onclick="updateQty(${p.id}, -1)" class="bg-red-500 text-white w-6 h-6 rounded-full ${qty === 0 ? 'invisible' : ''}"><i class="fas fa-minus text-[8px]"></i></button>
                        <span class="text-xs font-bold ${qty === 0 ? 'invisible' : ''}">${qty}</span>
                        <button onclick="updateQty(${p.id}, 1)" ${isOut ? 'disabled' : ''} class="bg-green-500 text-white w-6 h-6 rounded-full"><i class="fas fa-plus text-[8px]"></i></button>
                    </div>
                </div>`;
            }).join('');
            updateCartBadge();
        }

        function updateQty(id, change) {
            const idx = products.findIndex(p => p.id === id);
            if(idx > -1) {
                const p = products[idx];
                if (change > 0 && (p.qty || 0) >= p.stock) return alert('สต็อกไม่พอ!');
                products[idx].qty = Math.max(0, (products[idx].qty || 0) + change);
                localStorage.setItem('myProducts', JSON.stringify(products));
                renderShop();
                if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
            }
        }

        function updateCartBadge() {
            const total = products.reduce((sum, p) => sum + (p.qty || 0), 0);
            document.getElementById('cartCount').innerText = total;
            document.getElementById('cartFloatBtn').classList.toggle('hidden', total === 0);
        }

        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); renderCartItems(); }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }

        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            let sum = 0;
            document.getElementById('cartItemsList').innerHTML = list.map(p => {
                sum += (p.price * p.qty);
                return `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                    <span class="text-xs font-bold">${p.name}</span>
                    <span class="text-xs">${p.qty} x ${p.price}฿</span>
                </div>`;
            }).join('');
            document.getElementById('displayTotal').innerText = `${sum} ฿`;
        }

        function goToCheckout() {
            const total = products.reduce((sum, p) => sum + (p.price * (p.qty || 0)), 0);
            const type = document.querySelector('input[name="payType"]:checked').value;
            if(type === 'โอนสแกน') {
                document.getElementById('cartSummarySection').classList.add('hidden');
                document.getElementById('qrCheckoutSection').classList.remove('hidden');
                document.getElementById('qrFinalTotal').innerText = `${total} ฿`;
                if(qrCodeImg) { document.getElementById('qrDisplayImg').src = qrCodeImg; document.getElementById('qrDisplayImg').classList.remove('hidden'); document.getElementById('qrNoImgMsg').classList.add('hidden'); }
            } else { finishOrder(); }
        }

        async function finishOrder() {
            const totalQty = products.reduce((sum, p) => sum + (p.qty || 0), 0);
            const totalPrice = products.reduce((sum, p) => sum + (p.price * (p.qty || 0)), 0);
            const items = products.filter(p => p.qty > 0).map(p => `${p.name} (${p.qty})`).join(', ');
            const payType = document.querySelector('input[name="payType"]:checked').value;
            const seller = currentUser.name;

            products.forEach(p => { if(p.qty > 0) { p.stock -= p.qty; p.qty = 0; } });

            // Sync to Sheets
            const url = 'https://script.google.com/macros/s/AKfycbyrGByVuIKKh4W7ZLaqpYvD-c9g7D32Ztk6PQknP5SZiUZ50bq0E2zFW8H0laNyI6vBKw/exec';
            try { fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items, totalQty, totalPrice, payType, seller }) }); } catch (e) {}

            localStorage.setItem('myProducts', JSON.stringify(products));
            closeCart(); renderShop(); alert('บันทึกสำเร็จ!');
        }

        function renderAdmin() {
            document.getElementById('adminTableBody').innerHTML = products.map(p => `
                <tr>
                    <td class="p-4"><img src="${p.img}" class="w-10 h-10 rounded object-cover"></td>
                    <td class="p-4"><p class="font-bold text-[10px]">${p.name}</p><p class="text-[8px] text-blue-500">คลัง: ${p.stock || 0}</p></td>
                    <td class="p-4 text-right font-bold">${p.price}฿</td>
                    <td class="p-4 text-center">
                        <button onclick="editProduct(${p.id})" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function openProductModal() { editProdId = null; document.getElementById('pName').value = ''; document.getElementById('pPrice').value = ''; document.getElementById('pStock').value = ''; document.getElementById('productModal').classList.remove('hidden'); }
        function closeProductModal() { document.getElementById('productModal').classList.add('hidden'); }

        document.getElementById('saveProdBtn').onclick = async () => {
            const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value, stock = parseInt(document.getElementById('pStock').value) || 0;
            const file = document.getElementById('pImgFile').files[0];
            if(!name || !price) return;
            let imgUrl = editProdId ? products.find(p => p.id === editProdId).img : 'https://via.placeholder.com/150';
            if(file) imgUrl = await toBase64(file);
            if(editProdId) { const i = products.findIndex(p => p.id === editProdId); products[i] = {...products[i], name, price, img: imgUrl, stock}; }
            else { products.push({ id: Date.now(), name, price, img: imgUrl, qty: 0, stock }); }
            localStorage.setItem('myProducts', JSON.stringify(products)); closeProductModal(); renderAdmin();
        };

        function editProduct(id) { editProdId = id; const p = products.find(i => i.id === id); document.getElementById('pName').value = p.name; document.getElementById('pPrice').value = p.price; document.getElementById('pStock').value = p.stock || 0; document.getElementById('productModal').classList.remove('hidden'); }
        function deleteProduct(id) { if(confirm('ลบ?')) { products = products.filter(p => p.id !== id); localStorage.setItem('myProducts', JSON.stringify(products)); renderAdmin(); } }

        document.getElementById('qrInput').onchange = async (e) => { const file = e.target.files[0]; if(file) { qrCodeImg = await toBase64(file); localStorage.setItem('qrCodeImg', qrCodeImg); alert('QR บันทึกแล้ว'); } };

        function renderUserTable() {
            document.getElementById('userTableBody').innerHTML = Object.keys(appUsers).map(pin => `
                <tr><td class="p-4 font-bold">${appUsers[pin].name}</td><td class="p-4 text-[10px]">${appUsers[pin].role}</td><td class="p-4 text-xs text-gray-400">${pin}</td>
                <td class="p-4 text-center"><button onclick="deleteUser('${pin}')" class="text-red-400 ${pin === currentUser.pin ? 'hidden' : ''}"><i class="fas fa-trash"></i></button></td></tr>`).join('');
        }
        function openUserModal() { document.getElementById('userModal').classList.remove('hidden'); }
        function closeUserModal() { document.getElementById('userModal').classList.add('hidden'); }
        document.getElementById('saveUserBtn').onclick = () => {
            const n = document.getElementById('uName').value, p = document.getElementById('uPin').value, r = document.getElementById('uRole').value;
            if(n && p) { appUsers[p] = { name: n, role: r }; localStorage.setItem('appUsers', JSON.stringify(appUsers)); closeUserModal(); renderUserTable(); }
        };
        function deleteUser(p) { delete appUsers[p]; localStorage.setItem('appUsers', JSON.stringify(appUsers)); renderUserTable(); }

        const toBase64 = file => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result); r.onerror = e => rej(e); });
    </script>
</body>
</html>
